name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  cabal:
    name: Cabal
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.6"
          cabal-version: "3.10.3.0"

      - name: Freeze dependencies
        run: cabal freeze

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all

      - name: Check package
        run: cabal check
